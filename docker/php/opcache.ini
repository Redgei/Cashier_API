[opcache]
; Enable OPcache
opcache.enable=1
opcache.enable_cli=1

; Memory Allocation (Increase if you have many dependencies)
opcache.memory_consumption=256
opcache.interned_strings_buffer=16

; Maximum number of files to store in the cache
opcache.max_accelerated_files=20000

; How often to check for file changes (0 = Never, best for Production)
opcache.revalidate_freq=0
opcache.validate_timestamps=0

; Optimization Level
opcache.save_comments=1
opcache.fast_shutdown=1

; PHP 8+ JIT (Just-In-Time Compilation)
; This is the "Turbo" mode for PHP 8.5
opcache.jit=tracing
opcache.jit_buffer_size=100M

